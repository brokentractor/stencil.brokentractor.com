<!-- Jump to Category / Parts Finder widget.
     Template data provides 4 levels. Deeper levels are lazy-fetched via the Storefront
     GraphQL API one node at a time (rootEntityId) to stay within BC's complexity limit.
     Styles live in scss/layouts/home/_home.scss. -->
<style>
@media only screen and (max-width: 767px) {
    .pf-header { cursor: pointer; user-select: none; display: flex; align-items: center; justify-content: space-between; }
    .pf-toggle-label { font-size: 12px; font-weight: 700; opacity: 0.8; }
    #parts-finder.pf-collapsed .pf-body { display: none; }
}
.pf-field--btn { position: relative; }
#pf-tip {
    position: absolute;
    bottom: calc(100% + 10px);
    right: 0;
    background: #ffbe00;
    color: #001212;
    font-family: 'proxima-nova', arial, sans-serif;
    font-size: 12px;
    font-weight: 700;
    line-height: 1.2;
    padding: 7px 11px;
    white-space: nowrap;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    opacity: 0;
    visibility: hidden;
    transform: translateY(4px);
    transition: opacity .18s ease, transform .18s ease;
    z-index: 60;
    pointer-events: none;
}
#pf-tip::after {
    content: "";
    position: absolute;
    top: 100%;
    right: 28px;
    border: 6px solid transparent;
    border-top-color: #ffbe00;
}
#pf-tip.pf-tip--show { opacity: 1; visibility: visible; transform: translateY(0); }
@media only screen and (max-width: 767px) {
    #pf-tip { white-space: normal; max-width: 92%; }
    #pf-tip::after { right: 24px; }
}
</style>

<meta id="pf-sf-token" content="{{settings.storefront_api.token}}">
<div id="parts-finder">
    <div class="pf-header">Jump to Category</div>
    <div class="pf-body">
        <div class="pf-field pf-field--btn">
            <button id="pf-go" disabled>FIND PARTS</button>
            <div class="pf-tip" id="pf-tip" role="status">Click here to jump to your selected category</div>
        </div>
    </div>
</div>

{{!-- JSON tree: "i" = entityId, "c" = children. Template provides 4 levels; deeper levels lazy-fetched. --}}
<script type="application/json" id="pf-tree">[{{#each categories}}{"n":{{{json name}}},"u":{{{json url}}},"i":{{id}},"c":[{{#each children}}{"n":{{{json name}}},"u":{{{json url}}},"i":{{id}},"c":[{{#each children}}{"n":{{{json name}}},"u":{{{json url}}},"i":{{id}},"c":[{{#each children}}{"n":{{{json name}}},"u":{{{json url}}},"i":{{id}},"c":[] }{{#unless @last}},{{/unless}}{{/each}}]}{{#unless @last}},{{/unless}}{{/each}}]}{{#unless @last}},{{/unless}}{{/each}}]}{{#unless @last}},{{/unless}}{{/each}}]</script>

<script>
// ── Mobile collapsible toggle ────
(function () {
    var finder = document.getElementById('parts-finder');
    var header = finder && finder.querySelector('.pf-header');
    if (!header) return;
    var toggleLabel = document.createElement('span');
    toggleLabel.className = 'pf-toggle-label';
    header.appendChild(toggleLabel);
    function isMobile() { return window.innerWidth <= 767; }
    function updateLabel() {
        toggleLabel.textContent = finder.classList.contains('pf-collapsed') ? '[Show]' : '[Hide]';
        toggleLabel.style.display = isMobile() ? '' : 'none';
    }
    updateLabel();
    header.addEventListener('click', function () {
        if (!isMobile()) return;
        finder.classList.toggle('pf-collapsed');
        updateLabel();
    });
})();

// ── Parts Finder Widget — dynamic depth with lazy GraphQL fetching ────
(function () {
    var pfBody = document.querySelector('#parts-finder .pf-body');
    var goBtn  = document.getElementById('pf-go');
    var tipEl  = document.getElementById('pf-tip');
    var treeEl = document.getElementById('pf-tree');
    if (!pfBody || !treeEl) return;

    var brands;
    try { brands = JSON.parse(treeEl.textContent); } catch (e) { brands = []; }
    if (!brands.length) return;

    // Token for lazy GraphQL fetches — available immediately since meta tag is above this script.
    var sfToken = (document.getElementById('pf-sf-token') || {}).getAttribute
        ? document.getElementById('pf-sf-token').getAttribute('content') : '';

    // Lazy-fetch the immediate children of a node by its BC entityId.
    // Caches result on node.c so subsequent selections skip the fetch.
    function fetchChildren(node, callback) {
        if (!sfToken || !node.i) { callback([]); return; }
        var q = '{ site { categoryTree(rootEntityId: ' + node.i + ') { entityId name path children { entityId name path children { entityId name path } } } } }';
        fetch('/graphql', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + sfToken },
            body: JSON.stringify({ query: q })
        })
        .then(function (r) { return r.json(); })
        .then(function (data) {
            var tree = data && data.data && data.data.site && data.data.site.categoryTree;
            if (!tree || !tree.length) { callback([]); return; }
            // tree[0] is the node itself; its children are what we want.
            function cvt(n) { return { n: n.name, u: n.path, i: n.entityId, c: (n.children || []).map(cvt) }; }
            var children = (tree[0].children || []).map(cvt);
            node.c = children; // cache so re-selection skips the fetch
            callback(children);
        })
        .catch(function () { callback([]); });
    }

    // depth → label
    var LABELS = ['Brand', 'Machine Type', 'Part Category', 'Sub-Category'];
    function labelFor(d) { return LABELS[d] || LABELS[LABELS.length - 1]; }

    // depth → placeholder
    var PLACEHOLDERS = ['Select Brand...', 'All Machine Types', 'All Categories'];
    function placeholderFor(d) { return PLACEHOLDERS[d] || 'All Sub-Categories'; }

    // ── strip-leading helpers ────
    function singular(w) { return (w.length > 3 && /s$/.test(w)) ? w.replace(/s$/, '') : w; }
    function stopSet() {
        var skip = { parts: 1, aftermarket: 1, oem: 1, the: 1, and: 1, '': 1 };
        var set = {};
        for (var a = 0; a < arguments.length; a++) {
            var words = (arguments[a] || '').toLowerCase().split(/[\s–\-]+/)
                .map(function (w) { return w.replace(/[^a-z0-9]/g, ''); })
                .filter(function (w) { return w && !skip[w]; });
            words.forEach(function (w) { set[singular(w)] = 1; });
            if (words.length >= 2) {
                var acr = words.map(function (w) { return w.charAt(0); }).join('');
                if (acr.length >= 2) set[acr] = 1;
            }
        }
        return set;
    }
    function stripLeading(label, set) {
        var words = (label || '').trim().split(/\s+/);
        var i = 0;
        while (i < words.length - 1) {
            var key = words[i].toLowerCase().replace(/[^a-z0-9]/g, '');
            if (!key) { i++; continue; }
            if (set[singular(key)]) { i++; } else { break; }
        }
        return words.slice(i).join(' ');
    }

    var levels = [];

    function find(arr, url) {
        if (!arr) return null;
        for (var i = 0; i < arr.length; i++) { if (arr[i].u === url) return arr[i]; }
        return null;
    }

    function trimTo(fromDepth) {
        while (levels.length > fromDepth) {
            var removed = levels.pop();
            if (removed.wrap.parentNode) removed.wrap.parentNode.removeChild(removed.wrap);
        }
    }

    function stopSetForDepth(depth) {
        var args = ['IH', 'articulated'];
        for (var i = 0; i < depth && i < levels.length; i++) {
            if (levels[i].node) args.push(levels[i].node.n);
        }
        return stopSet.apply(null, args);
    }

    function addLevel(depth, items) {
        var wrap = document.createElement('div');
        wrap.className = 'pf-field';

        var lbl = document.createElement('label');
        var id  = 'pf-sel-' + depth;
        lbl.setAttribute('for', id);
        lbl.textContent = labelFor(depth);

        var sel = document.createElement('select');
        sel.id = id;

        var strip = (depth === 1 || depth === 2) ? stopSetForDepth(depth) : null;
        sel.innerHTML = '<option value="">' + placeholderFor(depth) + '</option>';
        (items || []).forEach(function (it) {
            var o = document.createElement('option');
            o.value = it.u;
            o.textContent = strip ? stripLeading(it.n, strip) : it.n;
            sel.appendChild(o);
        });
        sel.disabled = !items || items.length === 0;

        wrap.appendChild(lbl);
        wrap.appendChild(sel);
        pfBody.insertBefore(wrap, pfBody.querySelector('.pf-field--btn'));

        var entry = { wrap: wrap, sel: sel, node: null };
        levels.push(entry);

        sel.addEventListener('change', function () {
            var selectedUrl = this.value;
            trimTo(depth + 1);
            var parentItems = depth === 0 ? brands : (levels[depth - 1].node ? levels[depth - 1].node.c : null);
            entry.node = selectedUrl ? find(parentItems, selectedUrl) : null;
            updateGo();
            if (!entry.node) { updateTip(); return; }

            if (entry.node.c && entry.node.c.length) {
                // Children already in template data — render immediately.
                addLevel(depth + 1, entry.node.c);
                updateTip();
            } else if (entry.node.i) {
                // No children in template data — lazy-fetch from GraphQL.
                fetchChildren(entry.node, function (children) {
                    if (children.length) addLevel(depth + 1, children);
                    updateTip();
                });
            } else {
                updateTip();
            }
        });

        return entry;
    }

    function updateGo() {
        goBtn.disabled = !(levels.length > 0 && levels[0].sel.value);
    }

    function atTreeEnd() {
        if (!levels.length || !levels[0].sel.value) return false;
        var last = levels[levels.length - 1];
        if (!last.sel.value) return false;
        return !last.node || !last.node.c || !last.node.c.length;
    }

    function updateTip() {
        if (tipEl) tipEl.classList.toggle('pf-tip--show', atTreeEnd());
    }

    goBtn.addEventListener('click', function () {
        var dest = '';
        for (var i = levels.length - 1; i >= 0; i--) {
            if (levels[i].sel.value) { dest = levels[i].sel.value; break; }
        }
        if (dest) window.location.href = dest;
    });

    function normPath(u) {
        if (!u) return '';
        try { u = new URL(u, window.location.origin).pathname; } catch (e) {}
        return u.replace(/\/+$/, '').toLowerCase();
    }

    var index = {};
    function buildIndex() {
        index = {};
        function idx(node, chain) {
            index[normPath(node.u)] = chain.slice();
            if (node.c) node.c.forEach(function (child) { idx(child, chain.concat(child.u)); });
        }
        brands.forEach(function (b) { idx(b, [b.u]); });
    }

    function preselect() {
        var chain = index[normPath(window.location.pathname)];
        if (!chain) return;
        chain.forEach(function (url, i) {
            if (i >= levels.length) return;
            levels[i].sel.value = url;
            levels[i].sel.dispatchEvent(new Event('change'));
        });
        updateTip();
    }

    buildIndex();
    addLevel(0, brands);
    preselect();
})();
</script>
