<div class="blog-share">
    <span class="blog-share__label">Share:</span>
    <a class="blog-share__btn blog-share__btn--facebook" href="#" target="_blank" rel="noopener" aria-label="Share on Facebook" onclick="window.open('https://www.facebook.com/sharer/sharer.php?u='+encodeURIComponent(window.location.href),'_blank','width=600,height=400');return false;">
        <svg width="18" height="18" aria-hidden="true"><use xlink:href="#icon-facebook"/></svg> Facebook
    </a>
    <a class="blog-share__btn blog-share__btn--x" href="#" target="_blank" rel="noopener" aria-label="Share on X" onclick="window.open('https://twitter.com/intent/tweet?url='+encodeURIComponent(window.location.href)+'&text='+encodeURIComponent(document.title),'_blank','width=600,height=400');return false;">
        <svg width="18" height="18" aria-hidden="true"><use xlink:href="#icon-twitter"/></svg> Twitter
    </a>
    <a class="blog-share__btn blog-share__btn--email" href="#" onclick="window.location.href='mailto:?subject='+encodeURIComponent(document.title)+'&body='+encodeURIComponent(window.location.href);return false;" aria-label="Share via Email">
        <svg width="18" height="18" aria-hidden="true"><use xlink:href="#icon-envelope"/></svg> Email
    </a>
    <button class="blog-share__btn blog-share__btn--print" onclick="window.print()" type="button" aria-label="Print this article">
        <svg width="18" height="18" aria-hidden="true"><use xlink:href="#icon-print"/></svg> Print
    </button>
    <button class="blog-share__btn blog-share__btn--copy" id="bt-copy-link" onclick="(function(btn){navigator.clipboard.writeText(window.location.href).then(function(){btn.textContent='✓ Copied!';setTimeout(function(){btn.innerHTML='<i class=&quot;fa fa-link&quot;></i> Copy Link';},2000);});})(this)" type="button">
        <i class="fa fa-link"></i> Copy Link
    </button>
</div>
