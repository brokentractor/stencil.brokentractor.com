{{#partial "head"}}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": "{{blog.post.title}}",
  "url": "{{blog.post.url}}",
  "datePublished": "{{blog.post.date_published}}",
  "author": {
    "@type": "Organization",
    "name": "Broken Tractor",
    "url": "https://www.brokentractor.com"
  },
  "publisher": {
    "@type": "Organization",
    "name": "Broken Tractor",
    "url": "https://www.brokentractor.com",
    "logo": {
      "@type": "ImageObject",
      "url": "https://www.brokentractor.com/content/bt-logo-schema.png"
    }
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "{{blog.post.url}}"
  }
}
</script>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Home",
      "item": "https://www.brokentractor.com/"
    },
    {
      "@type": "ListItem",
      "position": 2,
      "name": "Blog",
      "item": "https://www.brokentractor.com/blog/"
    },
    {
      "@type": "ListItem",
      "position": 3,
      "name": "{{blog.post.title}}",
      "item": "{{blog.post.url}}"
    }
  ]
}
</script>
{{/partial}}

{{#partial "page"}}

{{> components/common/breadcrumbs breadcrumbs=breadcrumbs}}

{{> components/blog/post post=blog.post show_tags=true}}
<br><br>
{{/partial}}
{{> layout/base}}
